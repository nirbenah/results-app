<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e1e6; min-height: 100vh; }

  /* Layout */
  .app { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar { background: #1a1b23; padding: 12px 20px; display: flex; align-items: center; border-bottom: 2px solid #2a2b35; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 18px; font-weight: 700; }
  .topbar .status { margin-left: auto; font-size: 12px; color: #6b7280; }
  .topbar .status.connected { color: #4ade80; }

  /* User bar */
  .userbar { background: #1a1b23; padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2a2b35; }
  .userbar-name { font-weight: 700; font-size: 15px; }
  .userbar-balance { margin-left: auto; font-weight: 600; color: #4ade80; font-size: 14px; }
  .userbar .btn-sm { font-size: 11px; padding: 3px 8px; }

  /* Content */
  .content { flex: 1; padding: 16px; overflow-y: auto; }

  /* Auth */
  .auth-box { background: #1e1f2a; border-radius: 10px; padding: 24px; margin-top: 40px; }
  .auth-box h3 { font-size: 16px; margin-bottom: 16px; color: #e1e1e6; text-align: center; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
  input, select { background: #0f1117; border: 1px solid #2a2b35; color: #e1e1e6; padding: 10px 12px; border-radius: 8px; font-size: 14px; width: 100%; outline: none; }
  input:focus, select:focus { border-color: #4f6fff; }
  .auth-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #4f6fff; color: white; flex: 1; }
  .btn-primary:hover { background: #3d5af1; }
  .btn-success { background: #059669; color: white; }
  .btn-success:hover { background: #047857; }
  .btn-danger { background: #dc2626; color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-outline { background: transparent; border: 1px solid #2a2b35; color: #9ca3af; }
  .btn-outline:hover { border-color: #4f6fff; color: #e1e1e6; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-block { width: 100%; }

  /* Cards */
  .card { background: #1e1f2a; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-open { background: #064e3b; color: #34d399; }
  .badge-pending { background: #78350f; color: #fbbf24; }
  .badge-won { background: #064e3b; color: #34d399; }
  .badge-lost { background: #7f1d1d; color: #fca5a5; }
  .badge-active { background: #1e3a5f; color: #60a5fa; }
  .badge-scheduled { background: #1e1f2a; color: #6b7280; border: 1px solid #2a2b35; }

  /* Section */
  .section { margin-bottom: 20px; }
  .section-title { font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

  /* Match card */
  .match { display: flex; align-items: center; padding: 12px; background: #252636; border-radius: 10px; margin-bottom: 8px; }
  .match-teams { flex: 1; }
  .match-teams .home { font-weight: 600; font-size: 15px; }
  .match-teams .vs { color: #6b7280; font-size: 12px; margin: 2px 0; }
  .match-teams .away { font-weight: 600; font-size: 15px; }
  .match-time { font-size: 11px; color: #6b7280; }
  .match-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

  /* Market options */
  .options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .option-btn { flex: 1; min-width: 80px; text-align: center; padding: 12px 8px; background: #252636; border: 1px solid #2a2b35; border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .option-btn:hover { border-color: #4f6fff; background: #2a2b45; }
  .option-btn.selected { border-color: #4ade80; background: #064e3b; }
  .option-label { font-size: 13px; color: #e1e1e6; }

  /* Leaderboard */
  .lb-row { display: flex; align-items: center; padding: 10px 12px; background: #252636; border-radius: 8px; margin-bottom: 4px; }
  .lb-rank { width: 28px; font-weight: 700; font-size: 16px; }
  .lb-rank.gold { color: #fbbf24; }
  .lb-rank.silver { color: #9ca3af; }
  .lb-rank.bronze { color: #d97706; }
  .lb-name { flex: 1; font-weight: 600; }
  .lb-stats { font-size: 12px; color: #6b7280; }
  .lb-highlight { background: #1e2a4a; border: 1px solid #4f6fff33; }

  /* Transaction */
  .tx-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2b35; font-size: 13px; }
  .tx-credit { color: #4ade80; font-weight: 600; }
  .tx-debit { color: #f87171; font-weight: 600; }

  /* Bottom nav */
  .bottomnav { background: #1a1b23; border-top: 2px solid #2a2b35; display: flex; position: sticky; bottom: 0; z-index: 10; }
  .nav-item { flex: 1; padding: 10px 0; text-align: center; font-size: 11px; font-weight: 600; color: #6b7280; cursor: pointer; border: none; background: none; }
  .nav-item.active { color: #4f6fff; }
  .nav-item:hover { color: #e1e1e6; }
  .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* Settle panel */
  .settle-panel { background: #252636; border-radius: 8px; padding: 12px; margin-top: 8px; }
  .settle-row { display: flex; align-items: center; gap: 8px; }
  .score-input { width: 50px; text-align: center; padding: 8px; font-size: 16px; font-weight: 700; }

  /* Group setup card */
  .setup-step { background: #252636; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .setup-step h4 { font-size: 14px; margin-bottom: 10px; }
  .setup-step.done { opacity: 0.5; }
  .step-number { display: inline-flex; width: 24px; height: 24px; border-radius: 50%; background: #4f6fff; color: white; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-right: 8px; }
  .step-number.done { background: #059669; }

  .hidden { display: none !important; }
  .empty { color: #4b5563; font-size: 13px; text-align: center; padding: 20px; }

  /* Log */
  .log { background: #0a0b10; border-radius: 8px; padding: 10px; max-height: 100px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; margin-top: 12px; }
  .log-entry { margin-bottom: 2px; color: #6b7280; }
  .log-entry.error { color: #f87171; }
  .log-entry.success { color: #4ade80; }

  /* Invite link */
  .invite-box { background: #0f1117; border: 1px solid #2a2b35; border-radius: 8px; padding: 10px; font-size: 12px; color: #9ca3af; word-break: break-all; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Results App</h1>
    <span class="status" id="conn-status">checking...</span>
  </div>

  <!-- User bar (visible after login) -->
  <div class="userbar hidden" id="userbar">
    <span class="userbar-name" id="user-name"></span>
    <span class="userbar-balance" id="user-balance"></span>
    <button class="btn btn-outline btn-sm" id="btn-logout">Logout</button>
  </div>

  <div class="content">
    <!-- AUTH SCREEN -->
    <div id="screen-auth">
      <div class="auth-box">
        <h3>Welcome to Results App</h3>
        <div class="form-group">
          <label>Username</label>
          <input id="auth-username" placeholder="Pick a username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="auth-email" type="email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="auth-password" type="password" placeholder="Password" />
        </div>
        <div class="auth-actions">
          <button class="btn btn-primary" id="btn-register">Register</button>
          <button class="btn btn-outline" id="btn-login" style="flex:1;">Login</button>
        </div>
      </div>
    </div>

    <!-- MATCHES SCREEN -->
    <div id="screen-matches" class="hidden">
      <div id="group-banner" class="card hidden">
        <div style="font-size:14px;font-weight:600;color:#4ade80;" id="group-banner-name"></div>
        <div style="font-size:12px;color:#6b7280;" id="group-banner-info"></div>
      </div>
      <div id="matches-list"></div>
    </div>

    <!-- MY BETS SCREEN -->
    <div id="screen-bets" class="hidden">
      <div class="section-title">My Bets</div>
      <div id="bets-list"><div class="empty">No bets yet</div></div>
    </div>

    <!-- LEADERBOARD SCREEN -->
    <div id="screen-leaderboard" class="hidden">
      <div class="section-title">Leaderboard</div>
      <div id="leaderboard-list"><div class="empty">Join a group to see the leaderboard</div></div>
    </div>

    <!-- WALLET SCREEN -->
    <div id="screen-wallet" class="hidden">
      <div class="card">
        <div class="card-title">Balance</div>
        <div style="font-size: 28px; font-weight: 700; color: #4ade80;" id="wallet-balance-big">0</div>
        <div style="font-size: 12px; color: #6b7280;">virtual credits</div>
      </div>
      <div class="section-title">Recent Transactions</div>
      <div id="wallet-transactions"></div>
    </div>

    <!-- GROUP SCREEN -->
    <div id="screen-group" class="hidden">
      <div class="section-title">Group Management</div>

      <!-- No group yet -->
      <div id="group-none">
        <div class="setup-step">
          <h4><span class="step-number">1</span> Create or Join a Group</h4>
          <div class="form-group">
            <input id="new-group-name" placeholder="Group name (e.g. The Rivals)" />
          </div>
          <button class="btn btn-primary btn-block" id="btn-create-group">Create Group</button>
          <div style="text-align:center;color:#6b7280;font-size:12px;margin:12px 0;">— or —</div>
          <div class="form-group">
            <input id="join-group-id" placeholder="Paste group invite code" />
          </div>
          <button class="btn btn-outline btn-block" id="btn-join-group">Join Group</button>
        </div>
      </div>

      <!-- Has group -->
      <div id="group-active" class="hidden">
        <div class="card">
          <div class="card-title" id="group-detail-name"></div>
          <div style="font-size:12px;color:#6b7280;" id="group-detail-members"></div>
          <div class="invite-box" id="group-invite-code"></div>
          <div style="font-size:11px;color:#6b7280;margin-top:4px;">Share this code so others can join</div>
        </div>

        <!-- Add member (commissioner only) -->
        <div id="add-member-area" class="hidden">
          <div class="card">
            <div class="card-title">Add Member</div>
            <div class="form-group">
              <input id="add-member-id" placeholder="User ID to add" />
            </div>
            <button class="btn btn-primary btn-sm" id="btn-add-member">Add</button>
          </div>
        </div>

        <!-- Season controls -->
        <div id="season-setup" class="card hidden">
          <div class="card-title"><span class="step-number">2</span> Start a Season</div>
          <div class="form-group">
            <select id="comp-select"></select>
          </div>
          <button class="btn btn-success btn-block" id="btn-start-season">Start Season</button>
        </div>

        <div id="season-active-info" class="card hidden">
          <div class="card-title">Current Season <span class="badge badge-active" id="season-status-badge">active</span></div>
          <div style="font-size:13px;color:#9ca3af;" id="season-comp-name"></div>
        </div>
      </div>

      <div class="log" id="activity-log"></div>
    </div>
  </div>

  <!-- Bottom navigation (visible after login) -->
  <div class="bottomnav hidden" id="bottomnav">
    <button class="nav-item active" data-screen="matches"><span class="nav-icon">&#9917;</span>Matches</button>
    <button class="nav-item" data-screen="bets"><span class="nav-icon">&#127922;</span>Bets</button>
    <button class="nav-item" data-screen="leaderboard"><span class="nav-icon">&#127942;</span>Board</button>
    <button class="nav-item" data-screen="wallet"><span class="nav-icon">&#128176;</span>Wallet</button>
    <button class="nav-item" data-screen="group"><span class="nav-icon">&#9881;</span>Group</button>
  </div>
</div>

<script>
// ─── Config ───
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:')
  ? 'http://localhost:3000'
  : 'https://results-app-production-4e7e.up.railway.app';

const STORAGE_KEY = 'results_app_session';

const state = {
  token: null,
  userId: null,
  username: null,
  groupId: null,
  seasonId: null,
  seasonStatus: null,
  isCommissioner: false,
  competitions: [],
  currentScreen: 'matches',
};

// ─── Persistence ───
function saveSession() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    token: state.token,
    userId: state.userId,
    username: state.username,
    groupId: state.groupId,
    seasonId: state.seasonId,
    seasonStatus: state.seasonStatus,
    isCommissioner: state.isCommissioner,
  }));
}

function loadSession() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.token) {
      Object.assign(state, saved);
      return true;
    }
  } catch {}
  return false;
}

function clearSession() {
  localStorage.removeItem(STORAGE_KEY);
  state.token = null;
  state.userId = null;
  state.username = null;
  state.groupId = null;
  state.seasonId = null;
  state.seasonStatus = null;
  state.isCommissioner = false;
}

// ─── API helper ───
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) {
    headers['Authorization'] = 'Bearer ' + state.token;
  }
  if (method === 'POST' && path.includes('/bets')) {
    headers['Idempotency-Key'] = Date.now().toString(36) + Math.random().toString(36).slice(2);
  }
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API + path, opts);
  const data = await res.json();

  if (!res.ok) {
    if (res.status === 401) {
      clearSession();
      showScreen('auth');
    }
    throw new Error(data.error?.message || 'HTTP ' + res.status);
  }
  return data;
}

// ─── Logging ───
function log(msg, type) {
  const el = document.getElementById('activity-log');
  if (!el) return;
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (type || '');
  entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.prepend(entry);
}

// ─── Connection check ───
async function checkConnection() {
  try {
    await api('GET', '/health');
    document.getElementById('conn-status').textContent = 'Connected';
    document.getElementById('conn-status').className = 'status connected';
  } catch {
    document.getElementById('conn-status').textContent = 'Offline';
  }
}

// ─── Screen management ───
function showScreen(name) {
  const screens = ['auth', 'matches', 'bets', 'leaderboard', 'wallet', 'group'];
  screens.forEach(function(s) {
    const el = document.getElementById('screen-' + s);
    if (el) el.classList.toggle('hidden', s !== name);
  });
  state.currentScreen = name;

  // Update nav
  document.querySelectorAll('.nav-item').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.screen === name);
  });

  // Show/hide nav and userbar
  const loggedIn = !!state.token;
  document.getElementById('bottomnav').classList.toggle('hidden', !loggedIn);
  document.getElementById('userbar').classList.toggle('hidden', !loggedIn);
}

// ─── Auth ───
async function doRegister() {
  var username = document.getElementById('auth-username').value.trim();
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value.trim();
  if (!username || !email || !password) return alert('Fill in all fields');

  try {
    var data = await api('POST', '/v1/auth/register', { username: username, email: email, password: password });
    state.token = data.token;
    state.userId = data.user.id;
    state.username = data.user.username;
    saveSession();
    onLogin();
  } catch (e) {
    alert('Register failed: ' + e.message);
  }
}

async function doLogin() {
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value.trim();
  if (!email || !password) return alert('Fill in email and password');

  try {
    var data = await api('POST', '/v1/auth/login', { email: email, password: password });
    state.token = data.token;
    state.userId = data.user.id;
    state.username = data.user.username;
    saveSession();
    onLogin();
  } catch (e) {
    alert('Login failed: ' + e.message);
  }
}

function doLogout() {
  clearSession();
  showScreen('auth');
}

async function onLogin() {
  document.getElementById('user-name').textContent = state.username;
  showScreen('matches');

  // Load data in parallel
  await Promise.all([
    loadWallet(),
    loadCompetitions(),
    loadMatches(),
    loadGroupState(),
  ]);
}

// ─── Wallet ───
async function loadWallet() {
  try {
    var data = await api('GET', '/v1/wallet');
    document.getElementById('user-balance').textContent = data.balance + ' credits';
    document.getElementById('wallet-balance-big').textContent = data.balance;

    var container = document.getElementById('wallet-transactions');
    if (data.transactions.length === 0) {
      container.innerHTML = '<div class="empty">No transactions yet</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < data.transactions.length; i++) {
      var tx = data.transactions[i];
      var cls = tx.direction === 'credit' ? 'tx-credit' : 'tx-debit';
      var sign = tx.direction === 'credit' ? '+' : '-';
      var label = tx.type.replace(/_/g, ' ');
      var time = new Date(tx.created_at).toLocaleTimeString();
      html += '<div class="tx-row"><span>' + label + ' <span style="color:#4b5563;font-size:11px">' + time + '</span></span><span class="' + cls + '">' + sign + tx.amount + '</span></div>';
    }
    container.innerHTML = html;
  } catch (e) {
    console.error('Wallet error:', e);
  }
}

// ─── Competitions ───
async function loadCompetitions() {
  try {
    var data = await api('GET', '/v1/competitions');
    state.competitions = data.competitions;
    var select = document.getElementById('comp-select');
    select.innerHTML = data.competitions.map(function(c) {
      return '<option value="' + c.id + '">' + c.name + '</option>';
    }).join('');
  } catch (e) {
    console.error('Competitions error:', e);
  }
}

// ─── Group state ───
async function loadGroupState() {
  if (!state.groupId) {
    document.getElementById('group-none').classList.remove('hidden');
    document.getElementById('group-active').classList.add('hidden');
    return;
  }

  try {
    var data = await api('GET', '/v1/groups/' + state.groupId);
    state.isCommissioner = data.commissioner_id === state.userId;

    document.getElementById('group-none').classList.add('hidden');
    document.getElementById('group-active').classList.remove('hidden');

    document.getElementById('group-detail-name').textContent = data.name;
    document.getElementById('group-detail-members').textContent = data.member_count + ' members';
    document.getElementById('group-invite-code').textContent = state.groupId;

    // Group banner on matches screen
    document.getElementById('group-banner').classList.remove('hidden');
    document.getElementById('group-banner-name').textContent = data.name;

    if (data.season) {
      state.seasonId = data.season.id;
      state.seasonStatus = data.season.status;
      document.getElementById('season-setup').classList.add('hidden');
      document.getElementById('season-active-info').classList.remove('hidden');
      document.getElementById('season-status-badge').textContent = data.season.status;
      document.getElementById('season-comp-name').textContent = data.season.competition?.name || '';
      document.getElementById('group-banner-info').textContent = data.season.competition?.name + ' - ' + data.season.status;
      saveSession();
    } else if (state.isCommissioner) {
      document.getElementById('season-setup').classList.remove('hidden');
      document.getElementById('season-active-info').classList.add('hidden');
    }

    if (state.isCommissioner) {
      document.getElementById('add-member-area').classList.remove('hidden');
    }
  } catch (e) {
    // Group might have been deleted
    state.groupId = null;
    saveSession();
    loadGroupState();
  }
}

// ─── Matches ───
async function loadMatches() {
  var container = document.getElementById('matches-list');
  if (!state.competitions.length) {
    try {
      var data = await api('GET', '/v1/competitions');
      state.competitions = data.competitions;
    } catch { return; }
  }

  var html = '';
  for (var c = 0; c < state.competitions.length; c++) {
    var comp = state.competitions[c];
    try {
      var data = await api('GET', '/v1/competitions/' + comp.id + '/matches');
      html += '<div class="section-title">' + comp.name + '</div>';
      for (var m = 0; m < data.matches.length; m++) {
        var match = data.matches[m];
        var kickoff = new Date(match.kickoff_at);
        var timeStr = kickoff.toLocaleDateString() + ' ' + kickoff.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        var isFinished = match.status === 'finished';
        var statusBadge = isFinished
          ? '<span class="badge badge-lost">finished</span>'
          : '<span class="badge badge-scheduled">scheduled</span>';

        html += '<div class="match" style="' + (isFinished ? 'opacity:0.5' : '') + '">'
          + '<div class="match-teams">'
          + '<div class="home">' + match.home_team + '</div>'
          + '<div class="vs">vs ' + statusBadge + '</div>'
          + '<div class="away">' + match.away_team + '</div>'
          + '</div>'
          + '<div class="match-actions">'
          + '<div class="match-time">' + timeStr + '</div>';

        if (!isFinished) {
          html += '<button class="btn btn-primary btn-sm" style="margin-top:4px;" data-action="bet" data-match="' + match.id + '">Bet</button>';
          html += '<button class="btn btn-outline btn-sm" style="margin-top:4px;font-size:10px;" data-action="settle" data-match="' + match.id + '" data-home="' + match.home_team + '" data-away="' + match.away_team + '">Settle</button>';
        }

        html += '</div></div>';
        html += '<div id="markets-' + match.id + '" class="hidden"></div>';
        html += '<div id="settle-' + match.id + '" class="hidden"></div>';
      }
    } catch (e) {
      html += '<div class="empty">Error loading matches</div>';
    }
  }
  container.innerHTML = html || '<div class="empty">No matches available</div>';

  // Attach event listeners
  container.querySelectorAll('[data-action="bet"]').forEach(function(btn) {
    btn.addEventListener('click', function() { toggleMarkets(this.dataset.match); });
  });
  container.querySelectorAll('[data-action="settle"]').forEach(function(btn) {
    btn.addEventListener('click', function() { toggleSettle(this.dataset.match, this.dataset.home, this.dataset.away); });
  });
}

async function toggleMarkets(matchId) {
  var container = document.getElementById('markets-' + matchId);
  if (!container.classList.contains('hidden')) {
    container.classList.add('hidden');
    return;
  }

  if (!state.seasonId) {
    alert('No active season. Go to Group tab and set one up first.');
    return;
  }

  try {
    var data = await api('GET', '/v1/matches/' + matchId + '/markets');
    var html = '';
    for (var i = 0; i < data.markets.length; i++) {
      var market = data.markets[i];
      var typeLabel = market.type.replace(/_/g, ' ');
      html += '<div class="card" style="margin: 8px 0;">'
        + '<div class="card-title">' + typeLabel + ' <span class="badge badge-open">' + market.status + '</span></div>'
        + '<div class="options">';
      for (var j = 0; j < market.options.length; j++) {
        var opt = market.options[j];
        html += '<div class="option-btn" data-action="place-bet" data-option="' + opt.id + '" data-label="' + opt.label + '">'
          + '<div class="option-label">' + opt.label + '</div>'
          + '</div>';
      }
      html += '</div></div>';
    }
    container.innerHTML = html;
    container.classList.remove('hidden');

    // Attach bet listeners
    container.querySelectorAll('[data-action="place-bet"]').forEach(function(btn) {
      btn.addEventListener('click', function() { placeBet(this.dataset.option, this.dataset.label, this); });
    });
  } catch (e) {
    alert('Markets error: ' + e.message);
  }
}

async function placeBet(optionId, label, el) {
  if (!state.seasonId) {
    alert('No active season!');
    return;
  }

  try {
    await api('POST', '/v1/bets', {
      season_id: state.seasonId,
      market_option_id: optionId,
    });

    el.classList.add('selected');
    log('Bet placed: ' + label, 'success');

    await Promise.all([loadWallet(), loadBets(), loadLeaderboard()]);
  } catch (e) {
    alert('Bet failed: ' + e.message);
  }
}

// ─── Settle ───
function toggleSettle(matchId, homeTeam, awayTeam) {
  var container = document.getElementById('settle-' + matchId);
  if (!container.classList.contains('hidden')) {
    container.classList.add('hidden');
    return;
  }

  container.innerHTML = '<div class="settle-panel">'
    + '<div style="font-size:12px;color:#9ca3af;margin-bottom:8px;">Set final score:</div>'
    + '<div class="settle-row">'
    + '<span style="font-size:13px;font-weight:600;">' + homeTeam + '</span>'
    + '<input type="number" class="score-input" id="home-score-' + matchId + '" min="0" value="2" />'
    + '<span style="color:#6b7280;">-</span>'
    + '<input type="number" class="score-input" id="away-score-' + matchId + '" min="0" value="1" />'
    + '<span style="font-size:13px;font-weight:600;">' + awayTeam + '</span>'
    + '<button class="btn btn-danger btn-sm" data-action="do-settle" data-match="' + matchId + '">Finish</button>'
    + '</div></div>';

  container.classList.remove('hidden');

  container.querySelector('[data-action="do-settle"]').addEventListener('click', function() {
    doSettle(this.dataset.match);
  });
}

async function doSettle(matchId) {
  var homeScore = parseInt(document.getElementById('home-score-' + matchId).value) || 0;
  var awayScore = parseInt(document.getElementById('away-score-' + matchId).value) || 0;

  try {
    var data = await api('POST', '/v1/admin/matches/' + matchId + '/finish', {
      home_score: homeScore,
      away_score: awayScore,
    });

    var outcomeText = data.outcome === 'home' ? data.home_team + ' wins!'
      : data.outcome === 'away' ? data.away_team + ' wins!'
      : 'Draw!';

    log('Match settled: ' + data.home_team + ' ' + homeScore + '-' + awayScore + ' ' + data.away_team + ' (' + outcomeText + ')', 'success');

    await Promise.all([loadWallet(), loadBets(), loadMatches(), loadLeaderboard()]);
  } catch (e) {
    alert('Settle failed: ' + e.message);
  }
}

// ─── Bets ───
async function loadBets() {
  if (!state.seasonId) return;
  var container = document.getElementById('bets-list');

  try {
    var data = await api('GET', '/v1/bets?season_id=' + state.seasonId);
    if (data.bets.length === 0) {
      container.innerHTML = '<div class="empty">No bets placed yet</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < data.bets.length; i++) {
      var bet = data.bets[i];
      var matchInfo = bet.market && bet.market.match ? bet.market.match.home_team + ' vs ' + bet.market.match.away_team : 'Outright';
      var statusCls = bet.status === 'won' ? 'badge-won' : bet.status === 'lost' ? 'badge-lost' : 'badge-pending';
      html += '<div class="card">'
        + '<div class="card-title">' + bet.market_option.label + ' <span class="badge ' + statusCls + '">' + bet.status + '</span></div>'
        + '<div style="font-size:12px;color:#6b7280">' + matchInfo + '</div>'
        + '</div>';
    }
    container.innerHTML = html;
  } catch (e) {
    console.error('Bets error:', e);
  }
}

// ─── Leaderboard ───
async function loadLeaderboard() {
  if (!state.groupId) return;
  var container = document.getElementById('leaderboard-list');

  try {
    var data = await api('GET', '/v1/groups/' + state.groupId + '/leaderboard');

    if (data.entries.length === 0) {
      container.innerHTML = '<div class="empty">No entries yet</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < data.entries.length; i++) {
      var entry = data.entries[i];
      var rankCls = entry.rank === 1 ? 'gold' : entry.rank === 2 ? 'silver' : entry.rank === 3 ? 'bronze' : '';
      var isMe = entry.user.id === state.userId;
      var highlight = isMe ? 'lb-highlight' : '';
      var rankDisplay = entry.rank || '-';
      var winRate = entry.total_bets > 0 ? Math.round(entry.win_rate * 100) + '%' : '-';
      var streak = entry.current_streak > 0 ? ' | streak: ' + entry.current_streak : '';

      html += '<div class="lb-row ' + highlight + '">'
        + '<div class="lb-rank ' + rankCls + '">' + rankDisplay + '</div>'
        + '<div class="lb-name">' + entry.user.username + (isMe ? ' (you)' : '') + '</div>'
        + '<div class="lb-stats">' + entry.wins + 'W ' + entry.losses + 'L | ' + winRate + streak + '</div>'
        + '</div>';
    }
    container.innerHTML = html;
  } catch (e) {
    console.error('Leaderboard error:', e);
  }
}

// ─── Group actions ───
async function createGroup() {
  var name = document.getElementById('new-group-name').value.trim();
  if (!name) return alert('Enter a group name');

  try {
    var group = await api('POST', '/v1/groups', { name: name });
    state.groupId = group.id;
    state.isCommissioner = true;
    saveSession();
    log('Group "' + name + '" created!', 'success');
    await loadGroupState();
    await loadCompetitions();
  } catch (e) {
    alert('Group error: ' + e.message);
  }
}

async function joinGroup() {
  var groupId = document.getElementById('join-group-id').value.trim();
  if (!groupId) return alert('Paste a group invite code');

  try {
    // Actually join the group on the server (adds user as member)
    await api('POST', '/v1/groups/' + groupId + '/join');
    state.groupId = groupId;
    saveSession();
    log('Joined group!', 'success');
    await loadGroupState();
  } catch (e) {
    alert('Join error: ' + e.message);
  }
}

async function addMember() {
  var userId = document.getElementById('add-member-id').value.trim();
  if (!userId) return alert('Enter a user ID');

  try {
    await api('POST', '/v1/groups/' + state.groupId + '/members', { user_id: userId });
    log('Member added!', 'success');
    document.getElementById('add-member-id').value = '';
    await loadGroupState();
  } catch (e) {
    alert('Add member error: ' + e.message);
  }
}

async function startSeason() {
  var compId = document.getElementById('comp-select').value;
  if (!compId || !state.groupId) return;

  try {
    var season = await api('POST', '/v1/groups/' + state.groupId + '/season', {
      competition_id: compId,
      starts_at: '2024-08-17T00:00:00Z',
      ends_at: '2025-05-25T00:00:00Z',
    });
    state.seasonId = season.id;
    state.seasonStatus = 'upcoming';
    log('Season created', 'success');

    // Activate
    await api('PATCH', '/v1/groups/' + state.groupId + '/season/status', { status: 'active' });
    state.seasonStatus = 'active';
    saveSession();
    log('Season activated!', 'success');

    await Promise.all([loadGroupState(), loadMatches(), loadLeaderboard()]);
  } catch (e) {
    alert('Season error: ' + e.message);
  }
}

// ─── Navigation event listeners ───
document.querySelectorAll('.nav-item').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var screen = this.dataset.screen;
    showScreen(screen);
    if (screen === 'bets') loadBets();
    if (screen === 'wallet') loadWallet();
    if (screen === 'leaderboard') loadLeaderboard();
    if (screen === 'matches') loadMatches();
    if (screen === 'group') loadGroupState();
  });
});

document.getElementById('btn-register').addEventListener('click', doRegister);
document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('btn-logout').addEventListener('click', doLogout);
document.getElementById('btn-create-group').addEventListener('click', createGroup);
document.getElementById('btn-join-group').addEventListener('click', joinGroup);
document.getElementById('btn-add-member').addEventListener('click', addMember);
document.getElementById('btn-start-season').addEventListener('click', startSeason);

// ─── Init ───
checkConnection();
if (loadSession()) {
  onLogin();
} else {
  showScreen('auth');
}
</script>
</body>
</html>
